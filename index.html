<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>OPSGROUP News</title>

  <style>
    :root {
      --bg: #f3f4f6;
   --card: #ffffff;
--text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --green-bg: #dcfce7;
      --green-text: #166534;
      --yellow-bg: #fef9c3;
      --yellow-text: #854d0e;
      --red-bg: #fee2e2;
      --red-text: #991b1b;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px;
    }

    .header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.4px;
    }
.title-line {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-logo {
  width: 44px;
  height: 44px;
  object-fit: contain;
  border-radius: 10px;
  flex-shrink: 0;
}
    .title-wrap p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
    }

    .btn-primary:hover {
      background: var(--blue-dark);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      max-width: 420px;
    }

    .search-box input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    .search-box input:focus {
      border-color: var(--blue);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 8px;
      box-shadow: var(--shadow);
      min-height: 74px;
    }
.clickable-summary {
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.clickable-summary:active {
  transform: scale(0.98);
}

.clickable-summary:hover {
  box-shadow: 0 10px 26px rgba(15, 23, 42, 0.12);
}
    .summary-card .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      white-space: nowrap;
    }

    .summary-card .count {
      font-size: 22px;
      font-weight: 800;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .column {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 300px;
    }

    .column-header {
      padding: 14px;
      font-size: 17px;
      font-weight: 800;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .column-header.today {
      background: var(--green-bg);
      color: var(--green-text);
    }

    .column-header.dayago {
      background: var(--yellow-bg);
      color: var(--yellow-text);
    }

    .column-header.daysago {
      background: var(--red-bg);
      color: var(--red-text);
    }

    .article-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .article {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .article-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .airport {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
    }

    .seq {
      min-width: 26px;
      height: 26px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .type {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1e40af;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .content {
      color: #374151;
      font-size: 13.5px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .empty {
      padding: 24px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .error-box {
      display: none;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 14px;
      padding: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      padding: 14px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #d1d5db;
      border-top-color: var(--blue);
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 980px) {
      .summary {
        grid-template-columns: repeat(3, 1fr);
      }

      .news-grid {
        grid-template-columns: 1fr;
      }

      .header-top {
        flex-direction: column;
      }

      .button-row {
        justify-content: flex-start;
        width: 100%;
      }

      .search-box {
        max-width: none;
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 12px;
      }
.search-box input {
  font-size: 16px;
}
      .header {
        padding: 16px;
        border-radius: 16px;
      }
.header-logo {
  width: 38px;
  height: 38px;
}
      .title-wrap h1 {
        font-size: 21px;
      }

      .title-wrap p {
        font-size: 14px;
      }

      .button-row {
        width: 100%;
      }

      button {
        width: 100%;
        padding: 12px 13px;
        font-size: 14px;
      }

      .status-row {
        margin-top: 14px;
      }

      .status {
        width: 100%;
        font-size: 13px;
      }

      .search-box {
        width: 100%;
        min-width: 0;
      }

      .summary {
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
        margin-bottom: 14px;
      }

      .summary-card {
        padding: 9px 6px;
        min-height: 66px;
        border-radius: 13px;
      }

      .summary-card .label {
        font-size: 11px;
        margin-bottom: 4px;
      }

      .summary-card .count {
        font-size: 21px;
      }

      .column {
        border-radius: 16px;
      }

      .column-header {
        padding: 13px;
        font-size: 17px;
      }

      .article {
        padding: 11px;
      }

      .airport {
        font-size: 15px;
      }

      .content {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="header-top">
        <div class="title-wrap">
  <div class="title-line">
    <h1>OPSGROUP News</h1>
    <img src="opsgroup_logo.jpg" alt="OPSGROUP logo" class="header-logo" />
  </div>
  <p>Display OPSGROUP news grouped by Today, day ago, and days ago.</p>
</div>
     
      </div>

      <div class="status-row">
        <div class="status" id="statusText">Automatically loading saved news...</div>

        <div class="search-box">
          <input
            id="searchInput"
            type="text"
            placeholder="ICAO, country, keyword..."
            oninput="renderNews()"
          />
        </div>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="loading" id="loadingBox">
      <div class="spinner"></div>
      <div>Loading...</div>
    </div>

<div class="summary">
  <div class="summary-card clickable-summary" onclick="scrollToSection('todaySection')">
    <div class="label">Today</div>
    <div class="count" id="todayCount">0</div>
  </div>

  <div class="summary-card clickable-summary" onclick="scrollToSection('dayAgoSection')">
    <div class="label">Day Ago</div>
    <div class="count" id="dayAgoCount">0</div>
  </div>

  <div class="summary-card clickable-summary" onclick="scrollToSection('daysAgoSection')">
    <div class="label">Days Ago</div>
    <div class="count" id="daysAgoCount">0</div>
  </div>
</div>

    <div class="news-grid">
<section class="column" id="todaySection">
  <div class="column-header today">Today</div>
  <div class="article-list" id="todayList"></div>
</section>

<section class="column" id="dayAgoSection">
  <div class="column-header dayago">Day Ago</div>
  <div class="article-list" id="dayAgoList"></div>
</section>

<section class="column" id="daysAgoSection">
  <div class="column-header daysago">Days Ago</div>
  <div class="article-list" id="daysAgoList"></div>
</section>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby35hNSIc_Py5-wGDxJjZVAcGb01vXeTNS9lJJo2S94wVkWweB_eIqLwJpn7awG_2Zs/exec";

    let allNews = [];

    window.addEventListener("DOMContentLoaded", function () {
      loadNews();
    });

    function setLoading(isLoading) {
      document.getElementById("loadingBox").style.display = isLoading ? "flex" : "none";
    }

    function setStatus(message) {
      document.getElementById("statusText").textContent = message;
    }

    function showError(message) {
      const box = document.getElementById("errorBox");

      if (!message) {
        box.style.display = "none";
        box.textContent = "";
        return;
      }

      box.style.display = "block";
      box.textContent = message;
    }

    async function callApi(action) {
      const url = APPS_SCRIPT_URL + "?action=" + encodeURIComponent(action) + "&t=" + Date.now();

      const response = await fetch(url, {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("HTTP Error: " + response.status);
      }

      const data = await response.json();

      if (!data.ok) {
        throw new Error(data.error || "Apps Script error");
      }

      return data;
    }

    async function loadNews() {
      try {
        showError("");
        setLoading(true);
        setStatus("Automatically loading saved news...");

        const result = await callApi("news");

        allNews = normalizeNews(result.data || []);
        renderNews();

        setStatus("Saved news loaded / Total " + allNews.length + " items");
      } catch (err) {
        showError(String(err));
        setStatus("Failed to load news");
      } finally {
        setLoading(false);
      }
    }



    function normalizeNews(data) {
      return data.map(function (item, index) {
        const age = item.age || "";
        const group = item.group || getGroupFromAge(age);

        return {
          seq: item.seq || index + 1,
          age: age,
          airport: item.airport || "",
          type: item.type || "",
          content: item.content || "",
          rawText: item.rawText || "",
          scrapedAt: item.scrapedAt || "",
          group: group
        };
      });
    }

    function getGroupFromAge(ageValue) {
      const age = String(ageValue || "").trim().toLowerCase();

      if (age === "today") {
        return "Today";
      }

      if (
        age === "yesterday" ||
        age === "1 day ago" ||
        age === "day ago"
      ) {
        return "day ago";
      }

      return "days ago";
    }
function scrollToSection(sectionId) {
  const target = document.getElementById(sectionId);
  if (!target) return;

  target.scrollIntoView({
    behavior: "smooth",
    block: "start"
  });
}
    function renderNews() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      const filtered = allNews.filter(function (item) {
        if (!keyword) return true;

        const haystack = [
          item.age,
          item.airport,
          item.type,
          item.content,
          item.rawText,
          item.group
        ].join(" ").toLowerCase();

        return haystack.includes(keyword);
      });

      const today = filtered.filter(function (item) {
        return item.group === "Today";
      });

      const dayAgo = filtered.filter(function (item) {
        return item.group === "day ago";
      });

      const daysAgo = filtered.filter(function (item) {
        return item.group === "days ago";
      });

      document.getElementById("todayCount").textContent = today.length;
      document.getElementById("dayAgoCount").textContent = dayAgo.length;
      document.getElementById("daysAgoCount").textContent = daysAgo.length;

      renderGroup("todayList", today);
      renderGroup("dayAgoList", dayAgo);
      renderGroup("daysAgoList", daysAgo);
    }

    function renderGroup(containerId, items) {
      const container = document.getElementById(containerId);

      if (!items || items.length === 0) {
        container.innerHTML = '<div class="empty">No news to display.</div>';
        return;
      }

      container.innerHTML = items.map(function (item, index) {
        return `
          <article class="article">
            <div class="article-top">
              <div class="airport">${escapeHtml(item.airport || "-")}</div>
              <div class="seq">${index + 1}</div>
            </div>

            ${item.type ? `<div class="type">${escapeHtml(item.type)}</div>` : ""}

            <div class="content">${escapeHtml(item.content || "")}</div>
          </article>
        `;
      }).join("");
    }

    function formatDateTime(value) {
      const d = new Date(value);

      if (isNaN(d.getTime())) {
        return value;
      }

      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");

      return yyyy + "-" + mm + "-" + dd + " " + hh + ":" + mi;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
